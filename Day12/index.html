<!DOCTYPE html>
<html>

<head>

    <title>Professional To-Do App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>📝 Professional To-Do List</h1>

    <div class="input-box">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter your task">

        <button onclick="addTask()">
            Add
        </button>

    </div>

    <p id="counter">
        Total Tasks : 0
    </p>

    <ul id="taskList">

    </ul>

</div>

<script src="script.js"></script>

</body>

</html>
