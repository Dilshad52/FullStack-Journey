<!DOCTYPE html>
<html>

<head>

    <title>Notes App Pro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>📝 Notes App Pro</h1>

    <input
        type="text"
        id="search"
        placeholder="Search Notes..."
        onkeyup="searchNotes()">

    <textarea
        id="noteInput"
        placeholder="Write your note..."></textarea>

    <button onclick="addNote()">
        Add Note
    </button>

    <div id="notesContainer"></div>

</div>

<script src="script.js"></script>

</body>

</html>
